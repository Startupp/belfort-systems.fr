<style>
:root { --bg:#F6F5FC; --ink:#1D2144; --muted:#55536B; --accent:#453C8C; --soft:#7C6BD6; --line:#E5E2F2; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Archivo",system-ui,sans-serif; background:var(--bg); color:var(--ink);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.lock { background:#fff; border:1px solid var(--line); border-radius:14px;
  padding:48px 40px; max-width:400px; width:100%; text-align:center;
  box-shadow:0 10px 28px rgba(29,33,68,0.08); }
.brand { font-family:"Spectral",Georgia,serif; font-size:1.5rem; font-weight:700; }
.brand span { color:var(--soft); }
p.hint { color:var(--muted); font-size:0.9rem; margin:14px 0 24px; }
input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:8px;
  font-size:1rem; margin-bottom:14px; font-family:inherit; }
input:focus { outline:2px solid var(--accent); border-color:transparent; }
button { width:100%; padding:12px; background:var(--accent); color:#fff; border:none;
  border-radius:8px; font-size:0.95rem; cursor:pointer; font-family:inherit; }
button:hover { opacity:0.9; }
.err { color:#a33; font-size:0.85rem; margin-top:12px; display:none; }
</style>
</head>

<script>
const SKEY = 'bsv:breteuil';
async function tryUnlock(password) {
  const raw = Uint8Array.from(atob(document.getElementById('payload').textContent.trim()), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:310000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  sessionStorage.setItem(SKEY, password);
  const html = new TextDecoder().decode(pt);
  document.open(); document.write(html); document.close();
}
(async () => {
  const saved = sessionStorage.getItem(SKEY);
  if (saved) { try { await tryUnlock(saved); return; } catch (_) { sessionStorage.removeItem(SKEY); } }
  document.getElementById('lockbox').hidden = false;
  document.getElementById('pw').focus();
})();
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.style.display = 'none';
  try { await tryUnlock(document.getElementById('pw').value); }
  catch (_) { err.style.display = 'block'; }
});
</script>
